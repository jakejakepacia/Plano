name: iOS CI

on:
  push:
    branches:
      - main
      - '**'

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and Test
        run: |
          # Use iPhone 17 simulator (exists on runner) with specific OS
            xcodebuild clean test \
            -scheme Plano \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.2' \
            -sdk iphonesimulator \
            -configuration Debug
