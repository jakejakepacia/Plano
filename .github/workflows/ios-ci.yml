name: iOS CI

on:
  push:
    branches:
      - main
      - '**'

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and Test
        run: |
          xcodebuild clean test \
          -scheme DressRentalApp \
          -destination 'platform=iOS Simulator,name=iPhone 14' \
          -sdk iphonesimulator \
          -configuration Debug
