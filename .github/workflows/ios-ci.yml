name: iOS CI

on:
  push:
    branches:
      - main
      - '**'

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: List simulators (debug)
        run: xcrun simctl list devices

      - name: Build and Test
        run: |
          xcodebuild clean test \
            -scheme Plano \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -sdk iphonesimulator \
            -configuration Debug
